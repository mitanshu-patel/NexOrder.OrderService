networks:
  nexorderorder-network:

services:
  nexorderordersql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: nexorderordersql
    env_file:
     - local.env
    ports:
      - 1433:1433
    volumes:
      - nexorderordersql_data:/var/opt/mssql
    networks:
      - nexorderorder-network

  nexorderorderapi:
    build:
      context: .
      dockerfile: NexOrder.OrderService/Dockerfile
    container_name: nexorderorderapi
    env_file:
      - local.env
    ports:
      - 7034:80
    depends_on:
      - nexorderordersql
    networks:
      - nexorderorder-network

volumes:
    nexorderordersql_data:
      driver: local